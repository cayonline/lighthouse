
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Than Words</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
  body {
    background: #f4f6f8;
    font-family: 'Inter', sans-serif;
  }

  h1, .card-title {
    font-family: 'Playfair Display', serif;
  }

  /* header block (book style) */
  .header-box {
    background:#2F8FB5;
    border-radius:28px;
    padding:32px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
  }

  /* cards */
  .card-deck {
    border-radius:24px;
    padding:28px;
    color:white;
    position:relative;
    transition:all 0.3s ease;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
  }

  .card-deck:hover {
    transform: translateY(-8px) rotate(-1deg);
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  }

  .card-title {
    font-size:1.5rem;
    font-weight:600;
  }

  .card-sub {
    opacity:0.9;
    font-size:0.95rem;
  }

  .card-blue { background:#2F8FB5; }
  .card-coral { background:#E07A7A; }
  .card-yellow { background:#D6D96C; color:#222; }
  .card-orange { background:#E6902E; }
  .card-green { background:#A8D17A; color:#222; }

  /* question cards */
  .question-card {
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 6px 15px rgba(0,0,0,0.05);
    transition:all 0.2s ease;
  }

  .question-card:hover {
    transform:translateY(-3px);
  }
</style>
</head>

<body class="py-12 px-6">

<div class="max-w-5xl mx-auto">

  <!-- HEADER -->
  <div class="flex justify-center mb-14">
    <div class="header-box text-center">
      <div class="text-lg tracking-[3px] italic">MORE THAN WORDS</div>
      <h1 class="text-4xl font-bold mt-3 leading-tight">
        深刻地<br>認識一個人
      </h1>
    </div>
  </div>

  <!-- SECTION VIEW -->
  <div id="sections-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <!-- QUESTION VIEW -->
  <div id="questions-view" class="hidden max-w-3xl mx-auto">
    
    <button onclick="showSections()" 
      class="mb-6 text-[#2F8FB5] font-medium hover:underline">
      ← Back
    </button>

    <h2 id="section-title" class="text-3xl font-bold mb-2"></h2>
    <p id="section-count" class="text-gray-500 mb-6"></p>

    <div id="questions-list" class="space-y-4"></div>
  </div>

</div>

<script>
const sections = [
  {
    title: "Childhood & Past",
    questions: [
      "What did you most often imagine yourself becoming when you were a child?",
      "Is there something from your upbringing that you still remember vividly how it felt?",
      "What was your favorite toy or object as a child, and why?",
      "How has your feeling about “family” changed from the past to now?"
    ]
  },
  {
    title: "Values & Beliefs",
    questions: [
      "What is your core personal definition of success?",
      "What is one thing you feel you could never compromise on?",
      "What quality in relationships do you value the most?",
      "If you had to describe your life philosophy in one sentence?"
    ]
  },
  {
    title: "Emotions & Relationships",
    questions: [
      "What does it feel like to be truly understood?",
      "In relationships, what are you most afraid of losing?",
      "What was the last thing that made you cry?",
      "Which is easier: loving or being loved?"
    ]
  },
  {
    title: "Fears & Vulnerability",
    questions: [
      "What is one thing you're most afraid of?",
      "What have you avoided because of fear?",
      "What part of you is most misunderstood?",
      "How do you handle loneliness?"
    ]
  },
  {
    title: "Dreams & Future",
    questions: [
      "If nothing stopped you, what would you do?",
      "Where do you hope to change in 5 years?",
      "What does your ideal life look like?",
      "Is there a dream you still think about?"
    ]
  },
  {
    title: "Self-Awareness",
    questions: [
      "Your biggest strength and weakness?",
      "What made you understand yourself recently?",
      "What thought do you repeat about yourself?",
      "Advice to your younger self?"
    ]
  },
  {
    title: "Light but Meaningful",
    questions: [
      "Favorite thing to do alone?",
      "A book or movie that changed you?",
      "What does home mean?",
      "Someone you want to thank?",
      "Dinner with anyone?",
      "What question do you want to be asked?"
    ]
  }
];

const colors = [
  "card-blue","card-coral","card-yellow",
  "card-orange","card-green","card-blue","card-coral"
];

function createSectionCards() {
  const container = document.getElementById('sections-view');
  container.innerHTML = '';

  sections.forEach((section, index) => {
    const card = document.createElement('div');

    card.className = `card-deck ${colors[index % colors.length]} cursor-pointer flex flex-col justify-between h-56`;

    card.innerHTML = `
      <div>
        <div class="absolute top-4 right-4 text-lg opacity-80">★</div>
        <h3 class="card-title">${section.title}</h3>
      </div>

      <div>
        <p class="card-sub">${section.questions.length} questions</p>
        <p class="mt-3 italic text-sm opacity-90">Tap to explore →</p>
      </div>
    `;

    card.onclick = () => showQuestions(index);
    container.appendChild(card);
  });
}

function showQuestions(index) {
  const section = sections[index];

  document.getElementById('sections-view').classList.add('hidden');
  document.getElementById('questions-view').classList.remove('hidden');

  document.getElementById('section-title').textContent = section.title;
  document.getElementById('section-count').textContent = section.questions.length + " questions";

  const list = document.getElementById('questions-list');
  list.innerHTML = '';

  section.questions.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = "question-card flex gap-4";

    item.innerHTML = `
      <div class="w-8 h-8 bg-[#2F8FB5] text-white flex items-center justify-center rounded-xl text-sm">
        ${i+1}
      </div>
      <p class="text-gray-800">${q}</p>
    `;

    list.appendChild(item);
  });
}

function showSections() {
  document.getElementById('sections-view').classList.remove('hidden');
  document.getElementById('questions-view').classList.add('hidden');
}

window.onload = createSectionCards;
</script>

</body>
</html>
